<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的在线书库</title>
    <!-- 样式与库的引入 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .transition-colors { transition: background-color 0.3s, color 0.3s; }
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 图标组件
        const Icon = ({ name, className = "w-5 h-5" }) => {
            const ref = React.useRef(null);
            useEffect(() => {
                if (window.lucide && ref.current) {
                    window.lucide.createIcons({
                        attrs: { class: className },
                        nameAttr: 'data-lucide',
                        icons: { [name]: window.lucide.icons[name] }
                    });
                }
            }, [name, className]);
            return <i ref={ref} data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [config, setConfig] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [currentView, setCurrentView] = useState({ type: 'home', params: {} });
            const [settings, setSettings] = useState({
                darkMode: false,
                fontSize: 18,
                maxWidth: 800
            });

            useEffect(() => {
                const fetchConfig = async () => {
                    try {
                        setLoading(true);
                        const response = await fetch('./article/index.json');
                        if (!response.ok) throw new Error('无法获取 ./article/index.json');
                        const data = await response.json();
                        setConfig(data);
                    } catch (err) {
                        setError('配置文件加载失败，请检查路径。');
                    } finally {
                        setLoading(false);
                    }
                };
                fetchConfig();
            }, []);

            // 首页视图
            const HomeView = () => (
                <div className="max-w-4xl mx-auto p-6">
                    <header className="mb-10 flex items-center gap-3">
                        <div className="p-2 bg-indigo-600 rounded-lg text-white shadow-lg">
                            <Icon name="Library" className="w-8 h-8" />
                        </div>
                        <h1 className="text-3xl font-extrabold tracking-tight">我的书库</h1>
                    </header>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {config?.novels.map(novel => (
                            <div 
                                key={novel.id}
                                onClick={() => setCurrentView({ type: 'detail', params: { novelId: novel.id } })}
                                className="flex gap-4 p-5 bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 cursor-pointer hover:shadow-xl hover:-translate-y-1 transition-all"
                            >
                                <div className="w-20 h-28 bg-gradient-to-br from-indigo-50 to-blue-100 dark:from-gray-700 dark:to-gray-600 rounded-lg flex-shrink-0 overflow-hidden flex items-center justify-center border border-gray-100 dark:border-gray-600 shadow-inner">
                                    {novel.cover ? 
                                        <img src={novel.cover} alt={novel.title} className="w-full h-full object-cover" /> : 
                                        <Icon name="Book" className="w-8 h-8 text-indigo-400" />
                                    }
                                </div>
                                <div className="flex-1 overflow-hidden">
                                    <h2 className="text-xl font-bold mb-1 truncate">{novel.title}</h2>
                                    <p className="text-sm text-indigo-600 dark:text-indigo-400 font-medium mb-2">{novel.author}</p>
                                    <p className="text-xs text-gray-500 dark:text-gray-400 line-clamp-3">{novel.description}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            // 详情/目录视图
            const DetailView = ({ novelId }) => {
                const novel = config?.novels.find(n => n.id === novelId);
                if (!novel) return <div className="p-10 text-center">未找到该小说</div>;

                return (
                    <div className="max-w-3xl mx-auto p-6 animate-in fade-in duration-500">
                        <button 
                            onClick={() => setCurrentView({ type: 'home', params: {} })}
                            className="flex items-center gap-1 text-indigo-600 font-medium mb-8 hover:opacity-70"
                        >
                            <Icon name="ArrowLeft" className="w-4 h-4" /> 返回列表
                        </button>
                        <div className="flex flex-col md:flex-row gap-8 mb-12">
                            <div className="w-40 h-56 bg-indigo-50 dark:bg-gray-700 rounded-xl shadow-2xl flex-shrink-0 flex items-center justify-center overflow-hidden border-4 border-white dark:border-gray-800">
                                {novel.cover ? 
                                    <img src={novel.cover} alt={novel.title} className="w-full h-full object-cover" /> : 
                                    <Icon name="Book" className="w-16 h-16 text-indigo-300" />
                                }
                            </div>
                            <div className="flex-1">
                                <h1 className="text-4xl font-black mb-2 leading-tight">{novel.title}</h1>
                                <p className="text-xl text-gray-500 mb-6">作者：{novel.author}</p>
                                <div className="p-5 bg-indigo-50/50 dark:bg-indigo-900/20 rounded-2xl text-gray-700 dark:text-gray-300 leading-relaxed border border-indigo-100/50 dark:border-indigo-800/30">
                                    {novel.description}
                                </div>
                            </div>
                        </div>
                        <div className="space-y-4">
                            <h3 className="text-2xl font-bold flex items-center gap-2 px-2">
                                <Icon name="AlignLeft" /> 目录
                            </h3>
                            <div className="grid grid-cols-1 gap-2">
                                {novel.chapters.map((chapter, index) => (
                                    <button
                                        key={chapter.id}
                                        onClick={() => setCurrentView({ type: 'reader', params: { novelId, chapterIndex: index } })}
                                        className="text-left p-4 bg-white dark:bg-gray-800 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 rounded-xl transition-all border border-gray-100 dark:border-gray-700 flex justify-between items-center group"
                                    >
                                        <span><span className="text-gray-400 mr-3 italic">{index + 1}</span>{chapter.title}</span>
                                        <Icon name="ChevronRight" className="w-4 h-4 text-gray-300 group-hover:text-indigo-500" />
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            // 阅读器视图
            const ReaderView = ({ novelId, chapterIndex }) => {
                const [content, setContent] = useState('');
                const [loadingContent, setLoadingContent] = useState(true);
                const novel = config?.novels.find(n => n.id === novelId);
                const chapter = novel?.chapters[chapterIndex];

                useEffect(() => {
                    const load = async () => {
                        if (!chapter) return;
                        try {
                            setLoadingContent(true);
                            const res = await fetch(`./article/${novelId}/${chapter.path}`);
                            if (!res.ok) throw new Error();
                            const txt = await res.text();
                            setContent(txt);
                            window.scrollTo(0, 0);
                        } catch {
                            setContent('无法加载章节文件，请检查文件路径是否正确。');
                        } finally {
                            setLoadingContent(false);
                        }
                    };
                    load();
                }, [novelId, chapter]);

                if (!novel || !chapter) return null;

                return (
                    <div className={`min-h-screen transition-colors ${settings.darkMode ? 'bg-zinc-900 text-zinc-300' : 'bg-orange-50/50 text-gray-900'}`}>
                        <div className="sticky top-0 z-10 bg-inherit border-b border-black/5 p-4 backdrop-blur-md bg-opacity-80">
                            <div className="max-w-4xl mx-auto flex justify-between items-center">
                                <button onClick={() => setCurrentView({ type: 'detail', params: { novelId } })} className="p-2 hover:bg-black/5 rounded-full">
                                    <Icon name="X" />
                                </button>
                                <div className="text-sm font-bold opacity-60 truncate px-4">{novel.title}</div>
                                <div className="flex gap-2">
                                    <button onClick={() => setSettings(s => ({ ...s, darkMode: !s.darkMode }))} className="p-2 hover:bg-black/5 rounded-full">
                                        <Icon name={settings.darkMode ? "Sun" : "Moon"} />
                                    </button>
                                    <button onClick={() => setSettings(s => ({ ...s, fontSize: s.fontSize >= 24 ? 16 : s.fontSize + 2 }))} className="p-2 hover:bg-black/5 rounded-full">
                                        <Icon name="Type" />
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div className="mx-auto px-6 py-16" style={{ maxWidth: `${settings.maxWidth}px`, fontSize: `${settings.fontSize}px`, lineHeight: '2' }}>
                            <h2 className="text-3xl font-black mb-12 text-center leading-tight">{chapter.title}</h2>
                            {loadingContent ? (
                                <div className="space-y-4 opacity-20">
                                    {[...Array(10)].map((_, i) => <div key={i} className="h-4 bg-current rounded w-full animate-pulse"></div>)}
                                </div>
                            ) : (
                                <div className="whitespace-pre-wrap space-y-6">{content}</div>
                            )}

                            <div className="mt-24 flex justify-between gap-4 border-t border-black/5 pt-12 pb-20">
                                <button 
                                    disabled={chapterIndex === 0}
                                    onClick={() => setCurrentView({ type: 'reader', params: { novelId, chapterIndex: chapterIndex - 1 } })}
                                    className="flex-1 flex items-center justify-center gap-2 p-4 rounded-2xl border border-current opacity-60 hover:opacity-100 disabled:hidden"
                                >
                                    <Icon name="ArrowLeft" /> 上一章
                                </button>
                                <button 
                                    disabled={chapterIndex === novel.chapters.length - 1}
                                    onClick={() => setCurrentView({ type: 'reader', params: { novelId, chapterIndex: chapterIndex + 1 } })}
                                    className="flex-1 flex items-center justify-center gap-2 p-4 bg-indigo-600 text-white rounded-2xl hover:bg-indigo-700 disabled:hidden"
                                >
                                    下一章 <Icon name="ArrowRight" />
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            if (loading) return <div className="h-screen flex items-center justify-center text-indigo-600"><Icon name="Loader" className="animate-spin w-8 h-8" /></div>;
            if (error) return <div className="h-screen flex flex-col items-center justify-center p-10 text-center"><Icon name="AlertTriangle" className="w-12 h-12 text-red-500 mb-4" /><p className="font-bold">{error}</p></div>;

            return (
                <div className={`min-h-screen ${settings.darkMode ? 'bg-zinc-900 text-white' : 'bg-gray-50'}`}>
                    {currentView.type === 'home' && <HomeView />}
                    {currentView.type === 'detail' && <DetailView novelId={currentView.params.novelId} />}
                    {currentView.type === 'reader' && <ReaderView novelId={currentView.params.novelId} chapterIndex={currentView.params.chapterIndex} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
